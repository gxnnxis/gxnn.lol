<title>gxnn.lol | Item Shop</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
}

/* BACKGROUND */
body {
    background: #000000;
    background-attachment: fixed;
    color: white;
    padding: 30px;
    position: relative;
    overflow-x: hidden;
}

/* DIAGONAL SCANLINE */
body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: linear-gradient(
        135deg,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0) 49%,
        rgba(120,0,0,0.15) 50%,
        rgba(0,0,0,0) 51%,
        rgba(0,0,0,0) 100%
    );

    background-size: 350% 350%;
    animation: scanMove 7s linear infinite;

    pointer-events: none;
    z-index: -1;
}

@keyframes scanMove {
    0% { background-position: 200% 200%; }
    100% { background-position: -100% -100%; }
}

/* TITLE */
h1 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 32px;
    color: #ff4d4d;
    text-shadow: 0 0 15px rgba(150, 0, 0, 0.7);
}

/* GRID */
.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
    max-width: 1300px;
    margin: auto;
}

/* ITEM CARD — BLACK + RED THEME */
.item {
    background: #0d0d0d;
    border: 2px solid #5a0000;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.25s;
    display: flex;
    flex-direction: column;

    /* 🔥 Dark red glow */
    box-shadow:
        0 0 10px rgba(150, 0, 0, 0.55),
        0 0 20px rgba(150, 0, 0, 0.35),
        0 0 30px rgba(150, 0, 0, 0.25);
}

.item:hover {
    transform: scale(1.04);
    box-shadow:
        0 0 15px rgba(200, 0, 0, 0.7),
        0 0 30px rgba(200, 0, 0, 0.45),
        0 0 45px rgba(200, 0, 0, 0.35);
}

/* TAGS */
.tag {
    background: #8b0000;
    padding: 6px 10px;
    font-size: 14px;
    font-weight: 700;
    width: fit-content;
    border-radius: 0 0 6px 0;
}

/* IMAGE */
.item-image {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
}

.item-image img {
    width: 90%;
    height: 90%;
    object-fit: contain;
}

/* INFO */
.info {
    padding: 15px;
    text-align: center;
}

.item-name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #ff4d4d;
}

/* PRICE */
.price {
    font-size: 18px;
    font-weight: 700;
    color: #ff4d4d;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
}

.price img {
    width: 22px;
    height: 22px;
}

/* OLD PRICE */
.old-price {
    text-decoration: line-through;
    opacity: 0.6;
    margin-left: 6px;
    font-size: 16px;
}

/* MOBILE FIX */
@media (max-width: 500px) {
    .item-image {
        aspect-ratio: 1 / 1.2;
    }
}
</style>
</head>

<body>

    <div class="item">
