<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gxnn.lol | Item Shop</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
}

/* ANIMATED BACKGROUND */
body {
    background: linear-gradient(135deg, #000000, #001a3d);
    background-size: 200% 200%;
    animation: bgPulse 12s ease-in-out infinite;
    color: white;
    padding: 30px;
    position: relative;
    overflow-x: hidden;
}

/* MOVING SCANLINE */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(
        135deg,
        transparent 0%,
        transparent 45%,
        rgba(0, 120, 255, 0.25) 50%,
        transparent 55%,
        transparent 100%
    );
    background-size: 300% 300%;
    animation: scanMove 6s linear infinite;
    pointer-events: none;
    z-index: -1;
}

/* BACKGROUND PULSE */
@keyframes bgPulse {
    0% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
}

/* SCANLINE MOVEMENT */
@keyframes scanMove {
    0% { background-position: 150% 150%; }
    100% { background-position: -50% -50%; }
}

/* PAGE TITLE */
h1 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 32px;
    text-shadow: 0 0 15px rgba(0, 150, 255, 0.7);
}

/* GRID — max 5 per row */
.shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
    max-width: 1300px;
    margin: auto;
}

/* ITEM CARD */
.item {
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 15px;
    overflow: hidden;
    transition: 0.25s;
    display: flex;
    flex-direction: column;
}

.item:hover {
    transform: scale(1.04);
    box-shadow: 0 0 25px rgba(0,150,255,0.5);
}

/* TAG (NEW!, SALE, ETC.) */
.tag {
    background: #00aaff;
    padding: 6px 10px;
    font-size: 14px;
    font-weight: 700;
    width: fit-content;
    border-radius: 0 0 6px 0;
}

/* IMAGE CONTAINER */
.item-image {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
}

.item-image img {
    width: 90%;
    height: 90%;
    object-fit: contain;
}

/* INFO SECTION */
.info {
    padding: 15px;
    text-align: center;
}

.item-name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
}

/* PRICE SECTION */
.price {
    font-size: 18px;
    font-weight: 700;
    color: #00d4ff;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
}

.price img {
    width: 22px;
    height: 22px;
}

/* OLD PRICE (strikethrough) */
.old-price {
    text-decoration: line-through;
    opacity: 0.6;
    margin-left: 6px;
    font-size: 16px;
}

/* MOBILE FIX */
@media (max-width: 500px) {
    .item-image {
        aspect-ratio: 1 / 1.2;
    }
}
</style>
</head>

<body>

<h1>gxnn.lol Item Shop</h1>

<div class="shop-grid">

    <!-- ITEM TEMPLATE -->
    <div class="item">
        <div class="tag">NEW!</div>
        <div class="item-image">
            <img src="items/diddy.webp" alt="Item Image">
        </div>
        <div class="info">
            <div class="item-name">Diddy</div>
            <div class="price">
                <img src="vbuck.webp" alt="V-Bucks">
                6700
            </div>
        </div>
    </div>

    <div class="item">
        <div class="tag" style="background:#ff3b3b;">1,200 OFF</div>
        <div class="item-image">
            <img src="items/rpg.webp" alt="Item Image">
        </div>
        <div class="info">
            <div class="item-name">RPG cus im mad as FUCK rn</div>
            <div class="price">
                <img src="vbuck.webp" alt="V-Bucks">
                FREE
                <span class="old-price">Hella funds nigga</span>
            </div>
        </div>
    </div>

    <div class="item">
        <div class="tag" style="background:#ffaa00;">OFFER</div>
        <div class="item-image">
            <img src="items/pickaxe.png" alt="Item Image">
        </div>
        <div class="info">
            <div class="item-name">Sharp Pickaxe</div>
            <div class="price">
                <img src="vbuck.webp" alt="V-Bucks">
                800
            </div>
        </div>
    </div>

    <div class="item">
        <div class="tag">NEW!</div>
        <div class="item-image">
            <img src="items/emote.png" alt="Item Image">
        </div>
        <div class="info">
            <div class="item-name">Funny Emote</div>
            <div class="price">
                <img src="vbuck.webp" alt="V-Bucks">
                500
            </div>
        </div>
    </div>

    <div class="item">
        <div class="tag" style="background:#ffaa00;">OFFER</div>
        <div class="item-image">
            <img src="items/glider.png" alt="Item Image">
        </div>
        <div class="info">
            <div class="item-name">Cool Glider</div>
            <div class="price">
                <img src="vbuck.webp" alt="V-Bucks">
                1200
            </div>
        </div>
    </div>

</div>

</body>
</html>
