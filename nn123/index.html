<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>nn123</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
        <!-- SOCIAL / EMBED PREVIEW -->
<meta property="og:title" content="gxnn.lol highlightz">
<meta property="og:description" content="Explore the nn123 highlights">
<meta property="og:type" content="website">
<meta property="og:url" content="https://gxnn.lol/nn123">
<meta property="og:image" content="https://gxnn.lol/nn123.mp4">

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050505;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .video-wrapper {
      position: relative;
      width: 85vw;
      max-width: 1400px;
      padding: 10px;
      border-radius: 20px;
      background: radial-gradient(circle at top left, #ff1b1b, #000000 55%);
      overflow: hidden;
      box-shadow:
        0 0 35px rgba(255, 0, 0, 0.8),
        0 0 80px rgba(0, 0, 0, 1);
    }

    /* 🔥 MOVING LIGHT EFFECT (same style as /itemshop) */
    .video-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(
        120deg,
        rgba(255, 40, 40, 0.25),
        rgba(0, 0, 0, 0.1),
        rgba(255, 40, 40, 0.25)
      );
      mix-blend-mode: screen;
      animation: lightMove 6s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes lightMove {
      0% {
        transform: translateX(-20%) translateY(-10%);
      }
      100% {
        transform: translateX(20%) translateY(10%);
      }
    }

    /* Outer glow */
    .video-wrapper::before {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: 26px;
      background: conic-gradient(from 180deg, #ff2a2a, #000000, #ff2a2a);
      opacity: 0.4;
      filter: blur(14px);
      z-index: -1;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 14px;
      background: #000;
      display: block;
    }

    /* Mobile scaling */
    @media (max-width: 600px) {
      .video-wrapper {
        width: 95vw;
        padding: 6px;
      }
      video {
        border-radius: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="video-wrapper">
    <video controls autoplay muted loop>
      <source src="nn123.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>
</body>
</html>
