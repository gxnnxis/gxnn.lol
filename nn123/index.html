  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000; /* PURE BLACK */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .video-wrapper {
      position: relative;
      width: 92vw;
      max-width: 1800px;
      padding: 12px;
      border-radius: 22px;
      background: radial-gradient(circle at top left, #ff1b1b, #000000 55%);
      overflow: hidden;
      box-shadow:
        0 0 45px rgba(255, 0, 0, 0.9),
        0 0 100px rgba(0, 0, 0, 1);
      z-index: 1;
    }

    /* 🔥 MOVING LIGHT — BEHIND VIDEO */
    .video-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: linear-gradient(
        120deg,
        rgba(255, 0, 0, 0.35),
        rgba(0, 0, 0, 0.1),
        rgba(255, 0, 0, 0.35)
      );
      mix-blend-mode: screen;
      animation: lightMove 6s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0; /* BEHIND VIDEO */
    }

    @keyframes lightMove {
      0% {
        transform: translateX(-25%) translateY(-12%);
      }
      100% {
        transform: translateX(25%) translateY(12%);
      }
    }

    /* Outer glow ring — behind everything */
    .video-wrapper::before {
      content: "";
      position: absolute;
      inset: -14px;
      border-radius: 28px;
      background: conic-gradient(from 180deg, #ff2a2a, #000000, #ff2a2a);
      opacity: 0.45;
      filter: blur(16px);
      z-index: -1;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 16px;
      background: #000;
      display: block;
      position: relative;
      z-index: 2; /* ALWAYS ON TOP */
    }

    @media (max-width: 600px) {
      .video-wrapper {
        width: 97vw;
        padding: 8px;
      }
      video {
        border-radius: 12px;
      }
    }
  </style>
