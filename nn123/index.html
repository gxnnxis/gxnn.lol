<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>nn123</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050505;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .video-wrapper {
      position: relative;
      padding: 6px; /* space for the glow border */
      border-radius: 18px;
      background: radial-gradient(circle at top left, #ff1b1b, #000000 55%);
      box-shadow:
        0 0 25px rgba(255, 0, 0, 0.7),
        0 0 60px rgba(0, 0, 0, 0.9);
    }

    .video-wrapper::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 22px;
      background: conic-gradient(from 180deg, #ff2a2a, #000000, #ff2a2a);
      opacity: 0.35;
      filter: blur(10px);
      z-index: -1;
    }

    video {
      display: block;
      max-width: min(90vw, 900px);
      max-height: 70vh;
      border-radius: 12px;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="video-wrapper">
    <video controls autoplay muted loop>
      <source src="gxnn.lol/nn123/nn123.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>
</body>
</html>
