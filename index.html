<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gxnn profile</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
}

body {
    background: black;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* BACKGROUND */
#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.4;
    z-index: -2;
}

/* PURPLE GLOW */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(140,0,255,0.15), transparent 70%);
    z-index: -1;
}

/* ENTER OVERLAY */
#enterOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.6s ease;
}

#enterOverlay.hidden {
    opacity: 0;
    pointer-events: none;
}

/* MAIN CARD */
.card {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;

    background: rgba(20, 20, 20, 0.6);
    backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.08);

    box-shadow: 
        0 0 40px rgba(140, 0, 255, 0.2),
        inset 0 0 20px rgba(255,255,255,0.03);

    display: flex;
    flex-direction: column;
    gap: 20px;

    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease;
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

/* TOP */
.top {
    display: flex;
    align-items: center;
    gap: 12px;
}

.avatar {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 20px rgba(200, 0, 255, 0.6);
}

.name {
    font-size: 20px;
    font-weight: 700;
    text-shadow:
        0 0 10px rgba(255,255,255,0.5),
        0 0 25px rgba(180, 0, 255, 0.7);
}

/* HANDLE */
.handle {
    text-align: center;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
    font-weight: 600;
}

/* ICONS */
.icons {
    display: flex;
    justify-content: center;
    gap: 30px;
}

.icons svg {
    width: 34px;
    height: 34px;
    fill: white;
    transition: 0.3s;
}

.icons svg:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 10px rgba(200,0,255,0.8));
}

/* STATS */
.stats {
    display: flex;
    justify-content: flex-start;
    font-size: 13px;
    opacity: 0.7;
}

/* MUSIC BAR */
.music-bar {
    position: fixed;
    bottom: 30px;
    width: 90%;
    max-width: 420px;

    padding: 12px 15px;
    border-radius: 20px;

    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(15px);

    display: flex;
    align-items: center;
    justify-content: space-between;

    opacity: 0;
    transition: 0.8s;
}

.music-bar.show {
    opacity: 1;
}

input[type=range] {
    width: 100px;
}
</style>
</head>

<body>

<div id="enterOverlay">gxnnloser.</div>

<img src="background.jpg" id="bg">

<div class="card" id="card">

    <div class="top">
        <img src="avatar.jpg" class="avatar">
        <div class="name">gxnnloser</div>
    </div>

    <div class="handle">@gxnnloser</div>

    <div class="icons">
        <a href="#">
            <svg viewBox="0 0 24 24">
                <path d="M20 4a16 16 0 0 0-4-1l-.2.4a15 15 0 0 0-7.6 0L8 3A16 16 0 0 0 4 4C2 7 1.5 10 2 13c2 1.5 4 2 6 2l.5-.7c-1-.3-2-.7-2.5-1.2l.5-.4c2 1 4 1 6 0l.5.4c-.5.5-1.5.9-2.5 1.2l.5.7c2 0 4-.5 6-2 .5-3-.5-6-2-9z"/>
            </svg>
        </a>

        <a href="#">
            <svg viewBox="0 0 24 24">
                <path d="M12 2v14a4 4 0 1 1-4-4h1v3h-1a1 1 0 1 0 1 1V2h3a5 5 0 0 0 5 5v3a8 8 0 0 1-5-2z"/>
            </svg>
        </a>
    </div>

    <div class="stats">
        <span>👁 47</span>
    </div>

</div>

<div class="music-bar" id="musicBar">
    <audio id="music" src="song.mp3" loop></audio>
    <span>Volume</span>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<script>
const music = document.getElementById("music");
const volume = document.getElementById("volume");
const overlay = document.getElementById("enterOverlay");
const card = document.getElementById("card");
const musicBar = document.getElementById("musicBar");

volume.addEventListener("input", () => {
    music.volume = volume.value;
});

overlay.addEventListener("click", async () => {
    try {
        await music.play();
    } catch {}

    overlay.classList.add("hidden");

    setTimeout(() => {
        card.classList.add("show");
        musicBar.classList.add("show");
    }, 200);
});
</script>

</body>
</html>
