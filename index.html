<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gxnn Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* BACKGROUND ELEMENTS */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        /* MAIN WRAPPER */
        .container {
            width: 90%;
            max-width: 440px;
            z-index: 1;
            filter: blur(10px);
            transition: filter 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER: AVATAR + USERNAME */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            align-self: flex-start;
            margin-left: 10px;
        }

        .avatar {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .username {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* CENTRAL BIO CARD */
        .bio-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .bio-card h2 {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        .bio-text {
            font-size: 15px;
            line-height: 2;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        /* SOCIAL LINKS (ICONS) */
        .links {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
        }

        .link-icon {
            width: 32px;
            height: 32px;
            fill: white;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .link-icon:hover {
            opacity: 1;
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
        }

        /* MINIMALIST PLAYER (BOTTOM) */
        .music-control {
            position: fixed;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
        }

        .music-control label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        input[type=range] {
            width: 100px;
            accent-color: white;
            cursor: pointer;
        }

        /* ENTER OVERLAY */
        #enterOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.6s ease;
        }

        #enterOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

    </style>
</head>
<body>

    </div>
</div>

<div class="music-control">
    <audio id="bgmusic" src="song.mp3" loop></audio>
    <label>Volume</label>
    <input type="range" min="0" max="1" step="0.01" value="0.5" id="volume" />
</div>

<div id="enterOverlay">
    click to enter
</div>

<script>
    const music = document.getElementById('bgmusic');
    const volume = document.getElementById('volume');
    const enterOverlay = document.getElementById('enterOverlay');
    const mainContent = document.getElementById('mainContent');

    volume.addEventListener('input', () => {
        music.volume = volume.value;
    });

    enterOverlay.addEventListener('click', () => {
        music.play().catch(() => console.log("Autoplay blocked"));
        enterOverlay.classList.add('hidden');
        mainContent.style.filter = 'blur(0)';
    });
</script>
