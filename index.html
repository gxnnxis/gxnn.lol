<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gxnn profile</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
}

body {
    background: black;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* BACKGROUND */
#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.4;
    z-index: -2;
}

/* PURPLE GLOW */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(140,0,255,0.15), transparent 70%);
    z-index: -1;
}

/* ENTER OVERLAY */
#enterOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.6s ease;
}

#enterOverlay.hidden {
    opacity: 0;
    pointer-events: none;
}

/* WRAPPER (card + music) */
.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;

    opacity: 0;
    transform: translateY(20px);
    transition: 0.8s;
}

.wrapper.show {
    opacity: 1;
    transform: translateY(0);
}

/* CARD */
.card {
    width: 600px;
    height: 300px;
    padding: 35px;
    border-radius: 25px;

    background: rgba(20, 20, 20, 0.6);
    backdrop-filter: blur(1px);

    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 
        0 0 50px rgba(140, 0, 255, 0.3),
        inset 0 0 15px rgba(255,255,255,0.03);

    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* TOP */
.top {
    display: flex;
    align-items: center;
    gap: 20px;
}

.avatar {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 25px rgba(200, 0, 255, 0.7);
}

.name {
    font-size: 30px;
    font-weight: 700;
    text-shadow:
        0 0 12px rgba(255,255,255,0.5),
        0 0 30px rgba(180, 0, 255, 0.8);
}

/* HANDLE */
.handle {
    text-align: center;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.3);
    font-weight: 600;
    font-size: 18px;
}

/* ICONS */
.icons {
    display: flex;
    justify-content: center;
    gap: 50px;
}

.icons a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.icons img {
    width: 50px;
    height: 50px;
    object-fit: contain;
}

.icons a:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 15px rgba(200,0,255,0.9));
}

/* STATS */
.stats {
    display: flex;
    justify-content: flex-start;
    font-size: 16px;
    opacity: 0.7;
}

/* MUSIC BAR */
.music-bar {
    width: 600px;
    height: 60px;
    padding: 14px 20px;
    border-radius: 20px;

    background: rgba(20,20,20,0.65);
    backdrop-filter: blur(1px);
    border: 2px solid rgba(255,255,255,0.3);

    display: flex;
    align-items: center;
    gap: 16px;
}

.music-left {
    display: flex;
    align-items: center;
    gap: 16px;
}

.song-cover {
    width: 55px;
    height: 55px;
    border-radius: 10px;
    object-fit: cover;
}

.song-info {
    font-size: 15px;
}

.song-title {
    font-weight: 600;
}

.time {
    opacity: 0.6;
}

.music-center {
    flex: 1;
}

#progress {
    width: 100%;
    height: 6px;
    cursor: pointer;
}

.music-right {
    font-size: 14px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div id="enterOverlay">click to enter</div>

<img src="background.jpg" id="bg" alt="background image">

<div class="wrapper" id="wrapper">

    <div class="card">

        <div class="top">
            <img src="avatar.jpg" class="avatar" alt="gxnnloser avatar">
            <div class="name">gxnnloser</div>
        </div>

        <div class="handle">@gxnnloser</div>

        <div class="icons">
            <!-- TikTok button -->
            <a href="https://www.tiktok.com/gxnnloser" target="_blank" rel="noopener noreferrer">
                <img src="tiktok.webp" alt="TikTok">
            </a>

            <!-- Discord button -->
            <a href="https://discord.com/746117601289044050" target="_blank" rel="noopener noreferrer">
                <img src="discord.webp" alt="Discord">
            </a>
        </div>

        <div class="stats">
            <span>👁 47</span>
        </div>

    </div>

    <!-- MUSIC BAR -->
    <div class="music-bar">
        <audio id="music" src="song.mp3"></audio>

        <div class="music-left">
            <img src="avatar.jpg" class="song-cover" alt="song cover">
            <div class="song-info">
                <div class="song-title">LVL.</div>
                <div class="time"><span id="current">0:00</span></div>
            </div>
        </div>

        <div class="music-center">
            <input type="range" id="progress" value="0">
        </div>

        <div class="music-right">
            <span id="duration">0:00</span>
        </div>
    </div>

</div>

<script>
const music = document.getElementById("music");
const overlay = document.getElementById("enterOverlay");
const wrapper = document.getElementById("wrapper");

const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

function formatTime(time) {
    const mins = Math.floor(time / 60);
    const secs = Math.floor(time % 60);
    return mins + ":" + (secs < 10 ? "0" + secs : secs);
}

music.addEventListener("loadedmetadata", () => {
    duration.textContent = formatTime(music.duration);
});

music.addEventListener("timeupdate", () => {
    if (!music.duration) return;
    progress.value = (music.currentTime / music.duration) * 100;
    current.textContent = formatTime(music.currentTime);
});

progress.addEventListener("input", () => {
    if (!music.duration) return;
    music.currentTime = (progress.value / 100) * music.duration;
});

overlay.addEventListener("click", async () => {
    try {
        await music.play();
    } catch {}

    overlay.classList.add("hidden");
    wrapper.classList.add("show");
});
</script>

</body>
</html>
