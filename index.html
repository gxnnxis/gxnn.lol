<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gxnn profile</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
}

body {
    background: black;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* BACKGROUND */
#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.4;
    z-index: -2;
}

/* PURPLE GLOW */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center 40%, rgba(140,0,255,0.18), transparent 75%);
    z-index: -1;
}

/* ENTER OVERLAY */
#enterOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 100;
    transition: opacity 0.6s ease;
}

#enterOverlay.hidden {
    opacity: 0;
    pointer-events: none;
}

/* WRAPPER */
.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.8s;
}

.wrapper.show {
    opacity: 1;
    transform: translateY(0);
}

/* CARD */
.card {
    width: 90%;
    max-width: 600px;
    height: 300px;
    padding: 35px;
    border-radius: 25px;
    background: rgba(20, 20, 20, 0.6);
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 
        0 0 50px rgba(140, 0, 255, 0.3),
        inset 0 0 15px rgba(255,255,255,0.03);
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* TOP */
.top {
    display: flex;
    align-items: center;
    gap: 20px;
}

.avatar {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 25px rgba(200, 0, 255, 0.7);
}

.name {
    font-size: 30px;
    font-weight: 700;
    text-shadow:
        0 0 12px rgba(255,255,255,0.5),
        0 0 30px rgba(180, 0, 255, 0.8);
}

/* HANDLE */
.handle {
    text-align: center;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.3);
    font-weight: 600;
    font-size: 18px;
}

/* ICONS */
.icons {
    display: flex;
    justify-content: center;
    gap: 50px;
}

.icons svg {
    width: 50px;
    height: 50px;
    fill: white;
    transition: 0.3s;
}

.icons svg:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 15px rgba(200,0,255,0.9));
}

/* STATS */
.stats {
    display: flex;
    justify-content: flex-start;
    font-size: 16px;
    opacity: 0.7;
}

/* MUSIC BAR */
.music-bar {
    width: 90%;
    max-width: 600px;
    height: 60px;
    padding: 14px 20px;
    border-radius: 20px;
    background: rgba(20,20,20,0.65);
    border: 2px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    gap: 16px;
}

.music-left {
    display: flex;
    align-items: center;
    gap: 16px;
}

.song-cover {
    width: 55px;
    height: 55px;
    border-radius: 10px;
    object-fit: cover;
}

.song-info {
    font-size: 15px;
}

.song-title {
    font-weight: 600;
}

.time {
    opacity: 0.6;
}

.music-center {
    flex: 1;
}

#progress {
    width: 100%;
    height: 6px;
    cursor: pointer;
}

.music-right {
    font-size: 14px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div id="enterOverlay">click to enter</div>

<img src="background.jpg" id="bg" alt="background image">

<div class="wrapper" id="wrapper">

    <div class="card">

        <div class="top">
            <img src="avatar.jpg" class="avatar" alt="gxnnloser avatar">
            <div class="name">gxnnloser</div>
        </div>

        <div class="handle">@gxnnloser</div>

        <div class="icons">

            <!-- TikTok (updated) -->
            <a href="#">
                <svg viewBox="0 0 24 24">
                    <path fill="white" d="M12.75 2c.41 2.07 1.88 3.7 3.75 4.22v3.03c-1.38-.03-2.69-.45-3.75-1.17v6.9a5.02 5.02 0 1 1-5-5.02c.34 0 .67.03 1 .1v3.12a2 2 0 1 0 2 2V2h2z"/>
                </svg>
            </a>

            <!-- Discord (updated) -->
            <a href="#">
                <svg viewBox="0 0 24 24">
                    <path fill="white" d="M20 4.5a19.8 19.8 0 0 0-4.9-1.5l-.24.48a17.3 17.3 0 0 1 4.1 1.7 17.6 17.6 0 0 0-15.84 0 17.3 17.3 0 0 1 4.1-1.7L7 3A19.8 19.8 0 0 0 2 4.5C.5 8 0 11.4.2 14.8c2.1 1.6 4.4 2.6 6.8 3l.54-1.1c-1.2-.4-2.3-1-3.3-1.8l.8-.6c2.4 1.4 5.1 2.1 7.9 2.1s5.5-.7 7.9-2.1l.8.6c-1 .8-2.1 1.4-3.3 1.8l.54 1.1c2.4-.4 4.7-1.4 6.8-3 .2-3.4-.3-6.8-1.8-10.3zM9 13.5c-.9 0-1.7-.8-1.7-1.7S8.1 10 9 10s1.7.8 1.7 1.7-.8 1.8-1.7 1.8zm6 0c-.9 0-1.7-.8-1.7-1.7S14.1 10 15 10s1.7.8 1.7 1.7-.8 1.8-1.7 1.8z"/>
                </svg>
            </a>

        </div>

        <div class="stats">
            <span>👁 47</span>
        </div>

    </div>

    <!-- MUSIC BAR -->
    <div class="music-bar">
        <audio id="music" src="song.mp3"></audio>

        <div class="music-left">
            <img src="avatar.jpg" class="song-cover" alt="song cover">
            <div class="song-info">
                <div class="song-title">LVL.</div>
                <div class="time"><span id="current">0:00</span></div>
            </div>
        </div>

        <div class="music-center">
            <input type="range" id="progress" value="0">
        </div>

        <div class="music-right">
            <span id="duration">0:00</span>
        </div>
    </div>

</div>

<script>
const music = document.getElementById("music");
const overlay = document.getElementById("enterOverlay");
const wrapper = document.getElementById("wrapper");

const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

function formatTime(time) {
    const mins = Math.floor(time / 60);
    const secs = Math.floor(time % 60);
    return mins + ":" + (secs < 10 ? "0" + secs : secs);
}

music.addEventListener("loadedmetadata", () => {
    duration.textContent = formatTime(music.duration);
});

music.addEventListener("timeupdate", () => {
    progress.value = (music.currentTime / music.duration) * 100;
    current.textContent = formatTime(music.currentTime);
});

progress.addEventListener("input", () => {
    if (!music.duration) return;
    music.currentTime = (progress.value / 100) * music.duration;
});

overlay.addEventListener("click", async () => {
    try { await music.play(); } catch {}
    overlay.classList.add("hidden");
    setTimeout(() => wrapper.classList.add("show"), 150);
});
</script>

</body>
</html>
