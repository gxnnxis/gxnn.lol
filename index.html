<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gxnn</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
color:white;
text-align:center;
overflow-x:hidden;
}

/* VIDEO BACKGROUND */

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* DARK OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* MAIN CONTAINER */

.container{
max-width:500px;
margin:auto;
padding-top:60px;
}

/* BANNER */

.banner{
width:100%;
height:180px;
object-fit:cover;
border-radius:16px;
}

/* AVATAR */

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
margin-top:-60px;
background:#111;
}

/* USERNAME */

.username{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

/* BIO */

.bio{
opacity:0.8;
margin:10px 0 25px 0;
}

/* LINKS */

.links{
display:flex;
flex-direction:column;
gap:12px;
}

.link{
background:rgba(255,255,255,0.12);
padding:14px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.2s;
backdrop-filter:blur(6px);
}

.link:hover{
background:rgba(255,255,255,0.25);
transform:scale(1.03);
}

/* MUSIC PLAYER */

.music{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px 15px;
border-radius:12px;
backdrop-filter:blur(6px);
}

.music input{
width:120px;
}

/* MOBILE */

@media (max-width:600px){

.banner{
height:140px;
}

}

</style>
</head>
<body>

<!-- VIDEO BACKGROUND -->

<video autoplay muted loop playsinline id="bg-video">
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<img src="banner.gif" class="banner">

<img src="avatar.jpg" class="avatar">

<div class="username">gxnn</div>

<div class="bio">

</div>

<div class="links">

<a class="link" href="https://www.tiktok.com/@opsw.c" target="_blank">
TikTok
</a>

<a class="link" href="https://discord.gg/746117601289044050" target="_blank">
Discord
</a>

<a class="link" href="https://roblox.com/users/3217993720" target="_blank">
Roblox
</a>

</div>

</div>

<!-- MUSIC PLAYER -->

<div class="music">

<audio id="bgmusic" autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<label>Volume</label>
<input type="range" min="0" max="1" step="0.01" value="0.5" id="volume">

</div>

<script>

const music = document.getElementById("bgmusic")
const volume = document.getElementById("volume")

music.volume = 0.5

volume.addEventListener("input", () => {
music.volume = volume.value
})

</script>

</body>
</html>
