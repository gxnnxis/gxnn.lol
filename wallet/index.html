<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gxnn.lol | Wallet</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
}

body {
    background: #0d1117;
    color: #e6edf3;
    padding: 30px;
}

/* HEADER */
h1 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 32px;
    font-weight: 700;
    color: #58a6ff;
}

/* WALLET CONTAINER */
.wallet {
    max-width: 1000px;
    margin: auto;
    background: #161b22;
    padding: 25px;
    border-radius: 12px;
    border: 1px solid #30363d;
}

/* TOTAL BALANCE */
.total-box {
    background: #0d419d33;
    border: 1px solid #1f6feb;
    padding: 18px;
    border-radius: 10px;
    margin-bottom: 25px;
}

.total-title {
    font-size: 14px;
    opacity: 0.7;
}

.total-value {
    font-size: 32px;
    font-weight: 700;
    margin-top: 5px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #30363d;
    text-align: left;
}

th {
    color: #8b949e;
    font-size: 13px;
    text-transform: uppercase;
}

.value {
    font-weight: 600;
    color: #58a6ff;
}

.graph-cell {
    width: 120px;
    height: 40px;
}

canvas {
    width: 100% !important;
    height: 40px !important;
}

/* TRANSACTION HISTORY */
.history {
    margin-top: 40px;
}

.history h2 {
    font-size: 20px;
    margin-bottom: 10px;
    color: #58a6ff;
}

.history-item {
    padding: 12px;
    border-bottom: 1px solid #30363d;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}

/* MODALS */
.modal-bg {
    position: fixed;
    inset: 0;
    background: #000000aa;
    display: none;
    justify-content: center;
    align-items: center;
}

.modal {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    border: 1px solid #30363d;
}

.modal h3 {
    margin-bottom: 10px;
}

.modal input {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
}

.modal button {
    width: 100%;
    padding: 10px;
    background: #238636;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>gxnn.lol Wallet</h1>

<div class="wallet">

    <div class="total-box">
        <div class="total-title">Total Portfolio Value</div>
        <div class="total-value" id="totalValue">$0.00</div>
    </div>

    <canvas id="portfolioChart" height="80"></canvas>

    <table>
        <thead>
            <tr>
                <th>Crypto</th>
                <th>Balance</th>
                <th>USD Value</th>
                <th>7d Trend</th>
            </tr>
        </thead>
        <tbody id="cryptoTable"></tbody>
    </table>

    <div class="history">
        <h2>Recent Activity</h2>

        <div class="history-item">
            <span>Received 2.1 ETH</span>
            <span>Mar 12</span>
        </div>

        <div class="history-item">
            <span>Sent 0.3 BTC</span>
            <span>Mar 10</span>
        </div>

        <div class="history-item">
            <span>Received 500 SOL</span>
            <span>Mar 7</span>
        </div>
    </div>

</div>

<!-- SEND MODAL -->
<div class="modal-bg" id="sendModal">
    <div class="modal">
        <h3>Send Crypto</h3>
        <input placeholder="Address">
        <input placeholder="Amount">
        <button onclick="closeModals()">Send</button>
    </div>
</div>

<!-- RECEIVE MODAL -->
<div class="modal-bg" id="receiveModal">
    <div class="modal">
        <h3>Receive Crypto</h3>
        <p>Your wallet address:</p>
        <input value="0xFAKE123456789" readonly>
        <button onclick="closeModals()">Close</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
/* Hard‑coded balances */
const balances = {
    BTC: 14.2,
    ETH: 220,
    SOL: 8500,
    BNB: 600,
    XRP: 90000
};

/* Fake prices */
const prices = {
    BTC: 68000,
    ETH: 3500,
    SOL: 150,
    BNB: 420,
    XRP: 0.62
};

/* STATIC 7‑DAY TREND DATA (never changes) */
const trends = {
    BTC: [82, 85, 88, 90, 87, 92, 95],
    ETH: [60, 62, 61, 65, 67, 70, 72],
    SOL: [40, 42, 45, 47, 50, 52, 55],
    BNB: [30, 31, 33, 34, 36, 38, 40],
    XRP: [10, 11, 12, 12, 13, 14, 15]
};

/* Build table */
const table = document.getElementById("cryptoTable");

Object.keys(balances).forEach(symbol => {
    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${symbol}</td>
        <td>${balances[symbol].toLocaleString()}</td>
        <td class="value" id="value-${symbol}">$0.00</td>
        <td class="graph-cell"><canvas id="graph-${symbol}"></canvas></td>
    `;

    table.appendChild(row);

    new Chart(document.getElementById(`graph-${symbol}`), {
        type: "line",
        data: {
            labels: ["", "", "", "", "", "", ""],
            datasets: [{
                data: trends[symbol],
                borderColor: "#58a6ff",
                borderWidth: 2,
                fill: false,
                tension: 0.3
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false } }
        }
    });
});

/* Update totals */
function updateValues() {
    let total = 0;

    Object.keys(balances).forEach(symbol => {
        const amount = balances[symbol];
        const usdValue = amount * prices[symbol];

        document.getElementById(`value-${symbol}`).textContent =
            "$" + usdValue.toLocaleString(undefined, { minimumFractionDigits: 2 });

        total += usdValue;
    });

    document.getElementById("totalValue").textContent =
        "$" + total.toLocaleString(undefined, { minimumFractionDigits: 2 });
}

updateValues();

/* Portfolio chart */
new Chart(document.getElementById("portfolioChart"), {
    type: "line",
    data: {
        labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
        datasets: [{
            label: "Portfolio Value",
            data: [120000, 123000, 125500, 128000, 130000, 135000, 142841],
            borderColor: "#1f6feb",
            backgroundColor: "#1f6feb33",
            fill: true,
            tension: 0.3
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: { x: { display: true }, y: { display: true } }
    }
});

/* Modals */
function closeModals() {
    document.getElementById("sendModal").style.display = "none";
    document.getElementById("receiveModal").style.display = "none";
}
</script>

</body>
</html>
