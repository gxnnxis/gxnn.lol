<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gxnn.lol | Wallet</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">
    <h2>gxnn.lol</h2>
    <div class="nav-item active">Assets</div>
    <div class="nav-item">Home</div>
    <div class="nav-item">Apps</div>

    <div class="action-buttons">
        <div class="action-btn">Buy</div>
        <div class="action-btn">Swap</div>
        <div class="action-btn">Send</div>
        <div class="action-btn">Receive</div>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <input class="search" placeholder="Search coins...">
    </div>

    <div class="content">
        <div class="balance-box">
            <div class="balance-title">Balance</div>
            <div class="balance-value" id="totalValue">$0.00</div>
        </div>

        <canvas id="portfolioChart" height="80"></canvas>

        <table>
            <thead>
                <tr>
                    <th>Crypto</th>
                    <th>Balance</th>
                    <th>USD Value</th>
                    <th>7d Trend</th>
                </tr>
            </thead>
            <tbody id="cryptoTable"></tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
