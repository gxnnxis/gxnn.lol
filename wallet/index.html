<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <input class="search" placeholder="Search anything...">
        <div class="profile">👤 gxnn.</div>
    </div>

    <!-- ASSET CARDS -->
    <div class="cards">
        <div class="asset-card">
            <div>Bitcoin</div>
            <div class="price" id="btcPrice">$0</div>
            <canvas id="btcChart"></canvas>
        </div>

        <div class="asset-card">
            <div>Ethereum</div>
            <div class="price" id="ethPrice">$0</div>
            <canvas id="ethChart"></canvas>
        </div>

        <div class="asset-card">
            <div>Solana</div>
            <div class="price" id="solPrice">$0</div>
            <canvas id="solChart"></canvas>
        </div>

        <div class="asset-card add-card">
            <div>+ Add Asset</div>
        </div>
    </div>

    <!-- GRID -->
    <div class="grid">

        <!-- CARD (BALANCE) -->
        <div class="card blue-card">
            <div class="label">Balance</div>
            <div class="big-balance" id="totalValue">$0.00</div>
        </div>

        <!-- PORTFOLIO CHART -->
        <div class="card">
            <div class="card-title">Chart</div>
            <canvas id="portfolioChart"></canvas>
        </div>

        <!-- PORTFOLIO LIST -->
        <div class="card">
            <div class="card-title">My Portfolio</div>
            <div id="cryptoTable"></div>
        </div>

    </div>
</div>
