<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">gxnn</h2>

        <nav>
            <div class="nav-item active">Assets</div>
            <div class="nav-item">Trade</div>
            <div class="nav-item">Earn</div>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- HEADER -->
        <header class="header">
            <input class="search" placeholder="Search assets">
            <div class="profile">👤</div>
        </header>

        <!-- BALANCE CARD -->
        <section class="card balance-card">
            <div class="label">Total balance</div>
            <div class="balance" id="totalValue">$0.00</div>
            <canvas id="portfolioChart"></canvas>
        </section>

        <!-- ASSETS TABLE -->
        <section class="card">
            <h3>Your assets</h3>

            <table>
                <thead>
                    <tr>
                        <th>Asset</th>
                        <th>Holdings</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody id="cryptoTable"></tbody>
            </table>
        </section>

    </main>

</div>

<script src="app.js"></script>
</body>
</html>
